services:
  redis:
    image: redis:7-alpine
    container_name: csx-redis
    ports: ["6379:6379"]
    restart: unless-stopped

  api:
    build: ./apps/api
    container_name: csx-api
    ports: ["8000:8000"]
    environment:
      - REDIS_URL=redis://redis:6379
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-phi3}
      - USE_LLM=${USE_LLM:-false}
      - ALLOWED_ORIGINS=http://localhost:3000
    depends_on: [redis]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  web:
    build: ./apps/web
    container_name: csx-web
    ports: ["3000:3000"]
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws/ecosystem
    depends_on: [api]
    restart: unless-stopped
